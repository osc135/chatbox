server {
    listen ${PORT};
    server_name _;

    # ── Quiz app at /quiz/ ──────────────────────────────────────────────────
    location /quiz/ {
        alias /usr/share/nginx/html/quiz/;
        try_files $uri $uri/ /quiz/index.html;
    }

    # ── Main Chatbox SPA (catch-all) ─────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Never cache HTML — ensures users always get the latest asset hashes after deploys
    location ~* \.html$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri /index.html;
    }

    # Recommended: cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
