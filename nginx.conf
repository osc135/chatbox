server {
    listen 80;
    server_name _;

    # ── Chess app at /chess/ ─────────────────────────────────────────────────
    location /chess/ {
        alias /usr/share/nginx/html/chess/;
        try_files $uri $uri/ /chess/index.html;
    }

    # ── Weather app at /weather/ ─────────────────────────────────────────────
    location /weather/ {
        alias /usr/share/nginx/html/weather/;
        try_files $uri $uri/ /weather/index.html;
    }

    # ── Main Chatbox SPA (catch-all) ─────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Recommended: cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
